name: Publish

on:
  push:
    branches:
      - main
      - develop

env:
  PYTHON_VERSION: 3.11

jobs:
  publish:
    # To enable auto publishing to github, update your electron publisher
    # config in package.json > "build" and remove the conditional below
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          [
            { os: "ubuntu-latest", cmd: "--linux" },
            { os: "macos-latest", cmd: "--mac --universal" },
            { os: "windows-latest", cmd: "--win" },
          ]

    steps:
      - name: Checkout git repo
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Node and NPM
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: add git binaries to PATH on Windows
        if: runner.os == 'Windows'
        run: |
          echo "C:\Program Files\Git\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "C:\Program Files\Git\mingw64\libexec\git-core" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install and build
        run: |
          npm cache clean --force
          npm install
          npm run postinstall
          npm run build

      - name: Publish releases
        if: runner.os != 'macOS'
        env:
          # This is used for uploading release assets to github
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm exec electron-builder -- --publish always ${{ matrix.platform.cmd }}

      - name: Publish mac universal release
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing: electron-builder decodes the base64 p12 and manages its own keychain
          CSC_LINK: ${{ secrets.APPLE_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_P12_PASSWORD }}
          # Notarization + stapling via the afterSign hook (.erb/scripts/notarize.ts)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASS: ${{ secrets.APPLE_ID_PASS }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          npm exec electron-builder -- --publish always ${{ matrix.platform.cmd }}
